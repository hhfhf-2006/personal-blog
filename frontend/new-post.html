<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data: https://cdnjs.cloudflare.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写文章 — 灰化肥发灰的小站</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-title">灰化肥发灰的小站</a>
    <form class="search-form" onsubmit="handleSearch(event)">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索文章…" autocomplete="off">
      <button type="submit" class="search-btn" aria-label="搜索" title="搜索">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </form>
    <nav>
      <ul class="nav-links" id="navLinks"></ul>
    </nav>
  </div>
</header>

<main class="main-content editor-page">
  <div class="post-list-header">
    <h1 id="pageTitle">写文章</h1>
  </div>

  <form id="postForm" onsubmit="handleSubmit(event)">
    <div class="form-group" id="titleGroup">
      <label for="title">标题</label>
      <input type="text" id="title" placeholder="输入文章标题…" maxlength="200" required>
      <span class="error-msg" id="titleError"></span>
    </div>

    <div class="form-group" id="contentGroup">
      <label for="content">内容（支持 Markdown 语法）</label>
      <textarea id="content" placeholder="支持 Markdown：# 标题、**粗体**、==高亮==、`代码`、[链接](url)…" required></textarea>
      <span class="error-msg" id="contentError"></span>
    </div>

    <div style="display:flex;gap:var(--gap-md);">
      <button type="submit" class="btn btn-primary" id="submitBtn">发布</button>
      <a href="/" class="btn btn-secondary">取消</a>
      <button type="button" class="btn btn-danger btn-sm" id="btnDelete" style="display:none;margin-left:auto;"
        onclick="deletePost()">删除</button>
    </div>
  </form>
</main>

<footer class="site-footer">
  &copy; 2026 灰化肥发灰的小站
</footer>

<script src="/js/common.js"></script>
<script>
/* ============================================================
   写文章 / 编辑文章
   ============================================================ */

// 编辑模式：?edit=文章ID（在块外声明，确保所有函数可访问）
let editID = null;

// 访问控制：未登录跳转登录页，非管理员跳转首页
(function() {
  if (!isLoggedIn()) {
    goToLogin();
    return;
  }
  if (!isAdmin()) {
    window.location.href = '/';
    return;
  }
  // —— 仅管理员可执行以下编辑器逻辑 ——
  editID = getQueryParam('edit');
  init().catch(err => console.error('初始化编辑器失败:', err));
})();

// —— 函数定义在顶层作用域，闭包正确捕获 editID ——

async function init() {
  updateHeader();

  if (editID) {
    document.getElementById('pageTitle').textContent = '编辑文章';
    document.getElementById('submitBtn').textContent = '保存修改';
    document.getElementById('btnDelete').style.display = 'inline-flex';

    try {
      const data = await api.get(`/posts/${editID}`);
      const post = data.data;
      document.getElementById('title').value = post.title;
      document.getElementById('content').value = post.content;
    } catch (err) {
      showToast('加载文章失败：' + err.message, 'error');
    }
  }
}

function showFieldError(field, msg) {
  const group = document.getElementById(field + 'Group');
  const error = document.getElementById(field + 'Error');
  if (msg) {
    group.classList.add('has-error');
    error.textContent = msg;
  } else {
    group.classList.remove('has-error');
    error.textContent = '';
  }
}

async function handleSubmit(e) {
  e.preventDefault();

  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();

  showFieldError('title', '');
  showFieldError('content', '');

  let valid = true;
  if (!title || title.length > 200) {
    showFieldError('title', '标题需要 1~200 个字符');valid = false;
  }
  if (!content) {
    showFieldError('content', '请输入文章内容');valid = false;
  }
  if (!valid) return;

  const btn = document.getElementById('submitBtn');
  btn.textContent = '提交中…';
  btn.disabled = true;

  try {
    if (editID) {
      await api.put(`/posts/${editID}`, { title, content });
      showToast('文章已更新！');
    } else {
      await api.post('/posts', { title, content });
      showToast('文章发布成功！');
    }
    setTimeout(() => { window.location.href = '/'; }, 500);
  } catch (err) {
    btn.textContent = editID ? '保存修改' : '发布';
    btn.disabled = false;
    showToast(err.message, 'error');
  }
}

async function deletePost() {
  if (!editID) return;
  if (!confirm('确定要删除这篇文章吗？此操作不可撤销。')) return;

  try {
    await api.delete(`/posts/${editID}`);
    showToast('文章已删除');
    setTimeout(() => { window.location.href = '/'; }, 500);
  } catch (err) {
    showToast(err.message, 'error');
  }
}
</script>

</body>
</html>
