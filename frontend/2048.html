<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data: https://cdnjs.cloudflare.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 — 灰化肥发灰的小站</title>
  <link rel="stylesheet" href="/games/2048/style/main.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* —— Override game CSS for full-page blog layout —— */
    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      font-size: 16px;
      background: var(--bg-page);
    }

    body {
      margin: 0;
    }

    /* —— 2048 page layout —— */
    .game-2048-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
      padding: var(--gap-2xl) var(--gap-lg);
    }

    /* —— Stats bar — cold, minimal —— */
    .game-stats-bar {
      display: flex;
      justify-content: center;
      gap: var(--gap-xl);
      margin-bottom: var(--gap-xl);
      padding: 14px 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 64px;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      font-family: var(--font-mono);
    }

    /* —— Hide original score/best containers — we use stats bar instead —— */
    .game-2048-page .scores-container {
      display: none;
    }

    /* —— Adjust heading for minimal look —— */
    .game-2048-page .heading {
      margin-bottom: 0;
    }

    .game-2048-page h1.title {
      font-size: 36px;
      font-weight: 500;
      color: var(--text-primary);
      float: none;
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* —— Above-game area —— */
    .game-2048-page .above-game {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--gap-lg);
      margin-bottom: var(--gap-md);
    }

    .game-2048-page .game-intro {
      float: none;
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      line-height: 1;
      margin: 0;
    }

    .game-2048-page .restart-button {
      float: none;
      display: inline-block;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
      font-family: var(--font-sans);
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      height: auto;
      line-height: 1.4;
      text-decoration: none;
    }

    .game-2048-page .restart-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* —— Game container — slightly more spacious —— */
    .game-2048-page .game-container {
      margin-top: var(--gap-md);
      background: #4C566A;          /* nord3 */
      border-radius: 6px;
      width: 500px;
      height: 500px;
    }

    /* —— Game explanation — subtle —— */
    .game-2048-page .game-explanation {
      margin-top: var(--gap-lg);
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      text-align: center;
    }

    .game-2048-page .game-explanation strong {
      color: var(--text-secondary);
    }

    .game-2048-page hr {
      display: none;
    }

    /* —— Footer (override game footer if any) —— */
    .game-2048-page + .site-footer {
      /* site-footer already styled globally */
    }

    /* —— Responsive —— */
    @media (max-width: 520px) {
      .game-2048-page .game-container {
        width: 280px;
        height: 280px;
        padding: 10px;
      }

      .game-2048-page .container {
        width: 280px;
        margin: 0 auto;
      }

      .game-stats-bar {
        gap: var(--gap-sm);
        padding: 10px 14px;
      }

      .stat-value {
        font-size: 0.95rem;
      }

      .game-2048-page h1.title {
        font-size: 24px;
      }

      .game-2048-page .above-game {
        flex-direction: column;
        gap: var(--gap-sm);
      }

      .game-2048-page .game-intro {
        font-size: 0.8rem;
      }

      /* Match main.css responsive tile/grid sizing */
      .game-2048-page .grid-cell {
        width: 57.5px;
        height: 57.5px;
        margin-right: 10px;
      }
      .game-2048-page .grid-row {
        margin-bottom: 10px;
      }
      .game-2048-page .tile,
      .game-2048-page .tile .tile-inner {
        width: 58px;
        height: 58px;
        line-height: 58px;
      }
      .game-2048-page .tile .tile-inner {
        font-size: 35px;
      }

      /* Override tile positions for 280px container */
      .game-2048-page .tile.tile-position-1-1 { transform: translate(0px, 0px); }
      .game-2048-page .tile.tile-position-1-2 { transform: translate(0px, 67px); }
      .game-2048-page .tile.tile-position-1-3 { transform: translate(0px, 135px); }
      .game-2048-page .tile.tile-position-1-4 { transform: translate(0px, 202px); }
      .game-2048-page .tile.tile-position-2-1 { transform: translate(67px, 0px); }
      .game-2048-page .tile.tile-position-2-2 { transform: translate(67px, 67px); }
      .game-2048-page .tile.tile-position-2-3 { transform: translate(67px, 135px); }
      .game-2048-page .tile.tile-position-2-4 { transform: translate(67px, 202px); }
      .game-2048-page .tile.tile-position-3-1 { transform: translate(135px, 0px); }
      .game-2048-page .tile.tile-position-3-2 { transform: translate(135px, 67px); }
      .game-2048-page .tile.tile-position-3-3 { transform: translate(135px, 135px); }
      .game-2048-page .tile.tile-position-3-4 { transform: translate(135px, 202px); }
      .game-2048-page .tile.tile-position-4-1 { transform: translate(202px, 0px); }
      .game-2048-page .tile.tile-position-4-2 { transform: translate(202px, 67px); }
      .game-2048-page .tile.tile-position-4-3 { transform: translate(202px, 135px); }
      .game-2048-page .tile.tile-position-4-4 { transform: translate(202px, 202px); }

      .game-2048-page .game-message p {
        font-size: 30px !important;
        margin-top: 90px !important;
      }
    }

    /* ======================================================
       Game over / 胜利 弹层按钮 —— 极简磨砂玻璃质感
       ====================================================== */

    /* 按钮容器：水平居中、留白 */
    .game-2048-page .game-message .lower {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 44px;
    }

    /* 磨砂玻璃按钮（Try again / Keep going 共用） */
    .game-2048-page .game-message .retry-button,
    .game-2048-page .game-message .keep-playing-button {
      -webkit-appearance: none;
      appearance: none;
      display: inline-block;
      margin: 0;
      padding: 11px 28px;
      font-size: 0.95rem;
      font-family: var(--font-sans);
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #2E3440;                              /* nord0 */
      background: rgba(255, 255, 255, 0.45);       /* 半透明白 */
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      cursor: pointer;
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      backdrop-filter: blur(10px) saturate(140%);  /* 磨砂玻璃核心 */
      box-shadow:
        0 4px 16px rgba(46, 52, 64, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
      transition: all 0.25s ease;
    }

    .game-2048-page .game-message .retry-button:hover,
    .game-2048-page .game-message .keep-playing-button:hover {
      color: #5E81AC;                              /* nord10 冰蓝 */
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(94, 129, 172, 0.45);
      transform: translateY(-1px);
      box-shadow:
        0 6px 22px rgba(94, 129, 172, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }

    .game-2048-page .game-message .retry-button:active,
    .game-2048-page .game-message .keep-playing-button:active {
      transform: translateY(0);
      box-shadow:
        0 2px 8px rgba(46, 52, 64, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    /* 关键修复：game over（及默认）只保留 Try again，隐藏 Keep going；
       仅胜利（game-won）时才显示 Keep going 供继续冲分。
       原 main.css 用 a.keep-playing-button 选择器无法命中 <button>，
       导致 game over 时 Keep going 仍然出现 —— 此处用 button 选择器修正。 */
    .game-2048-page .game-message .keep-playing-button {
      display: none;
    }
    .game-2048-page .game-message.game-won .keep-playing-button {
      display: inline-block;
    }
  </style>
</head>

<script>
// Initialize header after DOM is ready
updateHeader();

// —— 从后端同步真实最高分 ——
// 后端数据库是 Best Score 的唯一数据源（single source of truth）。
// 页面加载时从后端拉取确认的最高分，确保 2048 页面的 Best 显示
// 与排行榜数据库一致，而不是仅依赖 localStorage（新标签页会被清空）。
(function() {
  if (!isLoggedIn()) return;

  api.get('/games/scores/mine?game=2048')
    .then(function(data) {
      if (!data.data || !data.data.score || data.data.score <= 0) return;

      var serverBest = data.data.score;
      var localBest = parseInt(localStorage.getItem('bestScore') || '0', 10);

      // 取后端和本地的较大值写入 localStorage
      var best = Math.max(serverBest, localBest);
      if (best > localBest) {
        localStorage.setItem('bestScore', best);
      }

      // 直接更新页面上的 Best 显示
      var bestDisplay = document.getElementById('bestDisplay');
      if (bestDisplay) {
        bestDisplay.textContent = best.toLocaleString();
      }
    })
    .catch(function() {
      // 网络错误等，静默降级到 localStorage 值
    });
})();

// —— 全新会话检测：防止浏览器 localStorage 残留旧游戏数据 ——
// sessionStorage 在关闭标签页时自动清除，localStorage 则持久保留。
// 每次打开新标签页（sessionStorage 无标记）→ 清空旧的 gameState 和 bestScore，
// 避免把"删库前"的历史分数重新提交到数据库。
(function() {
  var SESSION_KEY = '2048_session_active';
  if (!sessionStorage.getItem(SESSION_KEY)) {
    // 全新标签页：清除上一轮游戏的残留状态
    try {
      localStorage.removeItem('gameState');
      localStorage.removeItem('bestScore');
      localStorage.removeItem('pendingScore');
      localStorage.removeItem('pendingBoardRefresh');
    } catch (e) {}
    sessionStorage.setItem(SESSION_KEY, '1');
  }
  // 同标签页内刷新 → sessionStorage 标记仍在 → 保留游戏状态不变
})();

// —— Continuous time display update ——
// The game engine only updates stats on each move (via actuate()).
// The time display needs to tick every second even when idle.
(function() {
  function updateTimeDisplay() {
    var timeEl = document.getElementById('timeDisplay');
    if (!timeEl) return;
    try {
      var raw = localStorage.getItem('gameState');
      if (!raw) return;
      var state = JSON.parse(raw);
      if (!state || !state.startTime) return;
      var elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      var m = Math.floor(elapsed / 60);
      var s = elapsed % 60;
      timeEl.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    } catch (e) {
      // localStorage not available or corrupted JSON — silently ignore
    }
  }
  // Update every second for a smooth clock
  setInterval(updateTimeDisplay, 1000);
})();

// —— 页面离开 / 切到后台 / 刷新时的兜底分数提交 ——
//
// 触发时机覆盖（业务定义的"游戏结束"）：
//   1. 刷新或关闭标签页           → beforeunload / pagehide
//   2. 点击站内链接跳转离开游戏页 → beforeunload / pagehide
//   3. 移动端切后台 / 切标签页    → visibilitychange (hidden)
//      （beforeunload 在移动端与 bfcache 场景常不触发，必须补这一路）
//
// 为什么用 keepalive fetch 而不是 navigator.sendBeacon：
//   后端 /api/v1/games/scores 通过 Authorization: Bearer <JWT> 头鉴权，
//   而 sendBeacon 无法自定义请求头（只能带 Content-Type），会被 401 拒绝。
//   keepalive fetch 既能携带 JWT 头，又能在页面卸载后继续把请求发完，是正确选择。
//
// 数据源：取 pendingScore（submitScore 写入的备份）与 gameState（每步快照）
// 的较大值。后端 UPSERT 只保留每个用户的最高分，重复提交不会产生脏数据。
(function() {
  var lastFlushed = 0; // 本会话已用 keepalive 提交过的最高分，去重防抖

  function readScore(key) {
    try {
      var obj = JSON.parse(localStorage.getItem(key) || 'null');
      return obj && obj.score > 0 ? obj.score : 0;
    } catch (e) {
      return 0;
    }
  }

  function flushPendingScore() {
    var token;
    try { token = localStorage.getItem('token'); } catch (e) { return; }
    if (!token) return;

    var score = Math.max(readScore('pendingScore'), readScore('gameState'));

    // 仅当存在更高的未提交分数时才发送，避免重复触发卸载事件时反复 POST
    if (score <= 0 || score <= lastFlushed) return;
    lastFlushed = score;

    // 写入排行榜页期望分数（供排行榜刷新对比）
    try {
      localStorage.setItem('pendingBoardRefresh', JSON.stringify({
        game: '2048',
        score: score,
        time: Date.now()
      }));
    } catch (e) {}

    // keepalive：保证请求在页面卸载后仍能送达
    fetch('/api/v1/games/scores', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ game_name: '2048', score: score }),
      keepalive: true
    }).catch(function() {});
  }

  window.addEventListener('pagehide', flushPendingScore);
  window.addEventListener('beforeunload', flushPendingScore);
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') flushPendingScore();
  });
})();

// —— 点击导航链接离开 2048 页面：结算分数 + 重置进行中的对局 ——
// 需求：点击导航按钮离开本页时，自动重置"进行中的对局"（等同于触发新游戏），
// 使下次返回本页时从新的一局开始。
//   · 先 flushGameScore() 结算当前分数（keepalive，确保送达后端）；
//   · 仅清除当前局的棋盘数据 gameState（保留 bestScore：同账号下次返回仍显示
//     历史最高分，且会从后端再次同步）。
// 登出按钮是 <button>（非 <a>），不会命中此处，由 logout() 单独处理彻底清理。
document.addEventListener('click', function (e) {
  var link = e.target.closest && e.target.closest('a[href]');
  if (!link) return;
  var href = link.getAttribute('href');
  if (!href || href.charAt(0) === '#') return;   // 页内锚点：不处理
  if (link.target === '_blank') return;           // 新标签页打开：不影响本页对局

  if (typeof flushGameScore === 'function') flushGameScore();
  try { localStorage.removeItem('gameState'); } catch (e) {}
}, true);
</script>

</body>
