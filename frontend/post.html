<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data: https://cdnjs.cloudflare.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/js/katex/katex.min.css">
  <script src="/js/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.5/purify.min.js" integrity="sha384-qSFej5dZNviyoPgYJ5+Xk4bEbX8AYddxAHPuzs1aSgRiXxJ3qmyWNaPsRkpv/+x5" crossorigin="anonymous"></script>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-title">灰化肥发灰的小站</a>
    <form class="search-form" onsubmit="handleSearch(event)">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索文章…" autocomplete="off">
      <button type="submit" class="search-btn" aria-label="搜索" title="搜索">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </form>
    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">首页</a></li>
        <li class="nav-dropdown" id="gameDropdown">
          <button class="nav-dropdown-toggle" aria-haspopup="true" aria-expanded="false">
            游戏中心
            <svg class="dropdown-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 1 5 5 9 1"/></svg>
          </button>
          <ul class="nav-dropdown-menu">
            <li><a href="/2048.html">2048</a></li>
            <li><a href="/leaderboard.html">排行榜</a></li>
          </ul>
        </li>
        <li><a href="/login.html">登录</a></li>
        <li><a href="/register.html">注册</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="main-content">
  <div id="postContent"></div>
</main>

<footer class="site-footer">
  &copy; 2026 灰化肥发灰的小站
</footer>

<script src="/js/common.js"></script>
<script src="/js/katex/katex.min.js"></script>
<script>
/* ============================================================
   文章详情页
   ============================================================ */

const postID = getPostIDFromURL();

async function loadPost() {
  const el = document.getElementById('postContent');

  if (!postID) {
    el.innerHTML = '<div class="empty-state"><p>缺少文章 ID</p><a href="/">← 回到首页</a></div>';
    return;
  }

  el.innerHTML = '<div class="empty-state"><p>加载中…</p></div>';

  try {
    // 并行加载文章详情和评论
    const [postData, commentsData] = await Promise.all([
      api.get(`/posts/${postID}`),
      api.get(`/posts/${postID}/comments`)
    ]);

    const post = postData.data;
    document.title = post.title + ' — 灰化肥发灰的小站';

    const isAdminUser = isAdmin();

    const renderedHTML = renderMarkdown(post.content);

    const actionBar = isAdminUser ? `
      <div class="article-actions">
        <button class="btn-glass btn-glass-edit" onclick="editPost()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          编辑
        </button>
        <button class="btn-glass btn-glass-delete" onclick="deleteArticle()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          删除
        </button>
      </div>` : '';

    el.innerHTML = `
      <article>
        <header class="article-header">
          <h1 class="article-title">${escapeHTML(post.title)}</h1>
          <div class="article-meta">
            <span>阅读约 ${post.reading_time} 分钟</span>
          </div>
          <div class="article-dates">
            <span>创建于 ${formatDate(post.created_at)}</span>
            ${post.is_edited ? `<span>最后编辑于 ${formatDate(post.updated_at)}</span>` : ''}
          </div>
        </header>

        <div class="article-body">
          ${renderedHTML}
        </div>

        ${actionBar}

        <div class="like-section">
          <button class="btn-like ${post.is_liked ? 'liked' : ''}" id="btnLike" onclick="toggleLike()">
            <span class="like-icon">${post.is_liked ? '❤' : '🤍'}</span>
            <span id="likeCount">${post.likes_count}</span>
          </button>
        </div>
      </article>

      <section class="comments-section">
        <h2>评论 (${post.comments_count})</h2>
        <div id="commentForm"></div>
        <div id="commentList"></div>
      </section>
    `;

    // 渲染评论表单
    renderCommentForm();
    // 渲染评论列表
    renderComments(commentsData.data || []);

  } catch (err) {
    el.innerHTML = `
      <div class="empty-state">
        <p>${escapeHTML(err.message)}</p>
        <a href="/">← 回到首页</a>
      </div>`;
  }
}

/* —— 文章编辑 / 删除（仅作者可见） —— */

function editPost() {
  window.location.href = `/new-post.html?edit=${postID}`;
}

async function deleteArticle() {
  if (!confirm('确定要删除这篇文章吗？文章下的所有评论也会被删除，此操作不可撤销。')) return;

  try {
    await api.delete(`/posts/${postID}`);
    showToast('文章已删除');
    setTimeout(() => { window.location.href = '/'; }, 500);
  } catch (err) {
    showToast(err.message, 'error');
  }
}

/* —— 点赞 —— */
async function toggleLike() {
  if (!isLoggedIn()) {
    showToast('请先登录', 'error');
    goToLogin();
    return;
  }

  try {
    const data = await api.post(`/posts/${postID}/like`);
    const btn = document.getElementById('btnLike');
    const icon = btn.querySelector('.like-icon');
    const count = document.getElementById('likeCount');

    if (data.data.liked) {
      btn.classList.add('liked');
      icon.textContent = '❤';
    } else {
      btn.classList.remove('liked');
      icon.textContent = '🤍';
    }
    count.textContent = data.data.likes_count;
  } catch (err) {
    showToast(err.message, 'error');
  }
}

/* —— 评论表单 —— */
function renderCommentForm() {
  const el = document.getElementById('commentForm');
  if (!el) return;

  if (!isLoggedIn()) {
    el.innerHTML = `<p class="comment-login-hint">
      <a href="javascript:goToLogin()">登录</a> 后可以发表评论
    </p>`;
    return;
  }

  el.innerHTML = `
    <div class="comment-form">
      <textarea id="commentInput" placeholder="写下你的想法…" rows="3"></textarea>
      <div class="form-actions">
        <button class="btn btn-primary btn-sm" onclick="submitComment(null)">发表评论</button>
      </div>
    </div>
  `;
}

async function submitComment(parentID) {
  const textarea = document.getElementById('commentInput');
  if (!textarea) {
    // 内联回复框
    const replyBox = document.getElementById('replyBox');
    if (replyBox) {
      const content = replyBox.value.trim();
      if (!content) return;
      try {
        await api.post(`/posts/${postID}/comments`, { content, parent_id: parentID });
        showToast('回复成功');
        loadPost(); // 刷新
      } catch (err) {
        showToast(err.message, 'error');
      }
    }
    return;
  }

  const content = textarea.value.trim();
  if (!content) { showToast('请输入评论内容', 'error'); return; }

  try {
    await api.post(`/posts/${postID}/comments`, { content, parent_id: parentID });
    showToast('评论发表成功');
    loadPost(); // 刷新
  } catch (err) {
    showToast(err.message, 'error');
  }
}

/* —— 评论列表（树形结构） —— */

// 暂存每条评论的原始 Markdown 正文，供「编辑」时回填 textarea
// （DOM 中只有渲染后的 HTML，编辑需要原文）。每次重新渲染前清空。
let commentContentMap = {};

function renderComments(comments) {
  const el = document.getElementById('commentList');
  if (!el) return;

  commentContentMap = {};

  if (!comments || comments.length === 0) {
    el.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:var(--gap-lg);">还没有评论，来写第一条吧</p>';
    return;
  }

  el.innerHTML = renderCommentTree(comments);
}

function renderCommentTree(comments, isReply) {
  const currentUser = getUser();

  return comments.map(c => {
    const isCommentAuthor = currentUser && currentUser.id === c.user_id;

    // 缓存原始正文，供就地编辑回填
    commentContentMap[c.id] = c.content;

    const editBtn = isCommentAuthor ? `
      <button class="btn-glass btn-glass-edit btn-glass-sm" onclick="editComment(${c.id})" title="编辑评论">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        编辑
      </button>` : '';

    const deleteBtn = isCommentAuthor ? `
      <button class="btn-glass btn-glass-delete btn-glass-sm" onclick="deleteComment(${c.id})" title="删除评论">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>` : '';

    return `
    <div class="comment-item ${isReply ? 'is-reply' : ''}">
      <div class="comment-meta">
        <span class="comment-author">${escapeHTML(c.username)}</span>
        <span class="comment-time">创建于 ${formatDate(c.created_at)}</span>
        ${c.is_edited ? `<span class="comment-time-edited">最后编辑于 ${formatDate(c.updated_at)}</span>` : ''}
      </div>
      <div class="comment-content" id="comment-content-${c.id}">${renderMarkdown(c.content)}</div>
      <div class="comment-edit-form" id="comment-edit-${c.id}" style="display:none;margin-bottom:var(--gap-xs);"></div>
      <div class="comment-actions">
        ${isLoggedIn() ? `<button class="comment-like-btn ${c.is_liked ? 'liked' : ''}" onclick="toggleCommentLike(${c.id}, this)">
          <span class="like-icon">${c.is_liked ? '❤' : '🤍'}</span>
          <span class="like-count">${c.likes_count || 0}</span>
        </button>` : `<span class="comment-like-btn" style="cursor:default;">
          <span class="like-icon">🤍</span>
          <span class="like-count">${c.likes_count || 0}</span>
        </span>`}
        ${isLoggedIn() ? `<button class="comment-reply-btn" onclick="showReplyBox(${c.id}, this)">
          回复
        </button>` : ''}
        ${editBtn}
        ${deleteBtn}
      </div>
      <div class="reply-form" id="reply-${c.id}" style="display:none;margin-top:var(--gap-sm);"></div>
      ${c.replies && c.replies.length > 0 ? renderCommentTree(c.replies, true) : ''}
    </div>
  `}).join('');
}

/* —— 评论编辑（仅作者可见，就地编辑） —— */
function editComment(commentID) {
  const contentEl = document.getElementById('comment-content-' + commentID);
  const editEl = document.getElementById('comment-edit-' + commentID);
  if (!contentEl || !editEl) return;

  const raw = commentContentMap[commentID] || '';
  contentEl.style.display = 'none';
  editEl.style.display = 'block';
  editEl.innerHTML = `
    <textarea id="comment-edit-input-${commentID}" rows="3"
      style="width:100%;padding:var(--gap-sm);border:1px solid var(--border);border-radius:var(--radius-sm);
      font-family:var(--font-sans);font-size:var(--font-size-sm);resize:vertical;box-sizing:border-box;">${escapeHTML(raw)}</textarea>
    <div style="display:flex;gap:var(--gap-xs);margin-top:6px;">
      <button class="btn btn-primary btn-sm" onclick="saveCommentEdit(${commentID})">保存</button>
      <button class="btn btn-secondary btn-sm" onclick="cancelCommentEdit(${commentID})">取消</button>
    </div>
  `;
  const ta = document.getElementById('comment-edit-input-' + commentID);
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

async function saveCommentEdit(commentID) {
  const ta = document.getElementById('comment-edit-input-' + commentID);
  if (!ta) return;
  const content = ta.value.trim();
  if (!content) { showToast('评论内容不能为空', 'error'); return; }

  try {
    await api.put(`/posts/${postID}/comments/${commentID}`, { content });
    showToast('评论已更新');
    loadPost(); // 刷新，使「最后编辑于」时间生效
  } catch (err) {
    showToast(err.message, 'error');
  }
}

function cancelCommentEdit(commentID) {
  const contentEl = document.getElementById('comment-content-' + commentID);
  const editEl = document.getElementById('comment-edit-' + commentID);
  if (editEl) { editEl.style.display = 'none'; editEl.innerHTML = ''; }
  if (contentEl) contentEl.style.display = '';
}

/* —— 评论删除（仅作者可见） —— */
async function deleteComment(commentID) {
  if (!confirm('确定要删除这条评论吗？所有回复也会被删除。')) return;

  try {
    await api.delete(`/posts/${postID}/comments/${commentID}`);
    showToast('评论已删除');
    loadPost(); // 刷新
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function toggleCommentLike(commentID, btn) {
  if (!isLoggedIn()) {
    showToast('请先登录', 'error');
    goToLogin();
    return;
  }

  try {
    const data = await api.post(`/posts/${postID}/comments/${commentID}/like`);
    const icon = btn.querySelector('.like-icon');
    const count = btn.querySelector('.like-count');

    if (data.data.liked) {
      btn.classList.add('liked');
      icon.textContent = '❤';
    } else {
      btn.classList.remove('liked');
      icon.textContent = '🤍';
    }
    count.textContent = data.data.likes_count;
  } catch (err) {
    showToast(err.message, 'error');
  }
}

let activeReplyID = null;

function showReplyBox(commentID, btn) {
  // 收起之前打开的回复框
  if (activeReplyID && activeReplyID !== commentID) {
    const oldBox = document.getElementById('reply-' + activeReplyID);
    if (oldBox) oldBox.style.display = 'none';
  }
  activeReplyID = commentID;

  const box = document.getElementById('reply-' + commentID);
  if (box.style.display === 'none' || !box.style.display) {
    box.style.display = 'block';
    box.innerHTML = `
      <textarea id="replyBox-${commentID}" placeholder="回复…" rows="2"
        style="width:100%;padding:var(--gap-sm);border:1px solid var(--border);border-radius:var(--radius-sm);
        font-family:var(--font-sans);font-size:var(--font-size-sm);resize:vertical;"></textarea>
      <div style="display:flex;gap:var(--gap-xs);margin-top:6px;">
        <button class="btn btn-primary btn-sm" onclick="submitReply(${commentID})">回复</button>
        <button class="btn btn-secondary btn-sm" onclick="cancelReply(${commentID})">取消</button>
      </div>
    `;
  } else {
    box.style.display = 'none';
    box.innerHTML = '';
  }
}

async function submitReply(parentID) {
  const textarea = document.getElementById('replyBox-' + parentID);
  if (!textarea) return;
  const content = textarea.value.trim();
  if (!content) { showToast('请输入回复内容', 'error'); return; }
  try {
    await api.post(`/posts/${postID}/comments`, { content, parent_id: parentID });
    showToast('回复成功');
    loadPost();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

function cancelReply(commentID) {
  const box = document.getElementById('reply-' + commentID);
  box.style.display = 'none';
  box.innerHTML = '';
  activeReplyID = null;
}

// 初始化
updateHeader();
loadPost();
</script>

</body>
</html>
