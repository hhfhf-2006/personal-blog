version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: my-blog-postgres
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog123456
      POSTGRES_DB: blog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/000001_init_schema.sql:/docker-entrypoint-initdb.d/000001_init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog_db"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: personal-blog
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=blog
      - DB_PASSWORD=blog123456
      - DB_NAME=blog_db
      - SERVER_PORT=8080
      - JWT_SECRET=048103dfc467142960c3327ca4bdc8ce5a96f252193cc352ffd7a3908de12891
      - FRONTEND_DIR=./frontend
    restart: unless-stopped

volumes:
  postgres_data: