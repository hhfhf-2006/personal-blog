name: CD

# 持续交付：代码合入 main 或打 tag 时，自动构建镜像并推送到 GitHub 容器仓库 (GHCR)
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]   # 例如 v1.0.0 会额外打上版本号标签

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # => ghcr.io/hhfhf-2006/personal-blog

jobs:
  build-and-push:
    name: 构建并推送镜像到 GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 推送镜像到 GHCR 所需权限
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN 是 GitHub 自动注入的，无需手动配置任何密钥
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签与元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
